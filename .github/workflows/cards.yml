name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"   # spustí se každý den v 03:00
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_border=true&count_private=true&bg_color=060807&title_color=39ff9c&icon_color=39ff9c&text_color=d6ffe9&border_color=1a2b22"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=060807&title_color=39ff9c&text_color=d6ffe9&border_color=1a2b22"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: "user=${{ github.repository_owner }}&hide_border=true&background=060807&border=1a2b22&stroke=39ff9c&ring=39ff9c&fire=39ff9c&currStreakNum=eafff4&sideNums=eafff4&currStreakLabel=4fcf8f&sideLabels=4fcf8f&dates=3c6153"
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg profile/streak.svg
          git commit -m "Update README stat cards" || exit 0
          git push
