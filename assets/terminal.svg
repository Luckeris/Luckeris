  .cursor1 { animation: blink 1s steps(1,end) infinite; }
  .cursor2 { animation: blink2 10.0s steps(1,end) infinite; }
  @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
  @keyframes blink2 {
    0%   { opacity:0; }
    85%  { opacity:0; }
    86%  { opacity:1; }
    90%  { opacity:0; }
    91%  { opacity:1; }
    95%  { opacity:0; }
    96%  { opacity:1; }
    100% { opacity:1; }
  }

  .scanline { animation: scanmove 6s linear infinite; }
  @keyframes scanmove { 0% { transform:translateY(-100%); } 100% { transform:translateY(100%); } }

  .glitch-red, .glitch-cyan { opacity:0; }
  .glitch-red  { fill:#ff2b54; animation: glitchRed 10.0s linear infinite; }
  .glitch-cyan { fill:#00e5ff; animation: glitchCyan 10.0s linear infinite; }
  @keyframes glitchRed {
    0%,20.9%  { opacity:0; transform:translate(0,0); }
    21%       { opacity:.75; transform:translate(-2.5px,0); }
    21.6%     { opacity:0; transform:translate(0,0); }
    21.8%     { opacity:.6; transform:translate(2px,0); }
    22.1%,54.9% { opacity:0; transform:translate(0,0); }
    55%       { opacity:.7; transform:translate(2.5px,0); }
    55.5%     { opacity:0; transform:translate(0,0); }
    82.9%     { opacity:0; }
    83%       { opacity:.7; transform:translate(-2px,0); }
    83.4%     { opacity:0; transform:translate(0,0); }
    100%      { opacity:0; }
  }
  @keyframes glitchCyan {
    0%,20.9%  { opacity:0; transform:translate(0,0); }
    21%       { opacity:.75; transform:translate(2.5px,0); }
    21.6%     { opacity:0; transform:translate(0,0); }
    21.8%     { opacity:.6; transform:translate(-2px,0); }
    22.1%,54.9% { opacity:0; transform:translate(0,0); }
    55%       { opacity:.7; transform:translate(-2.5px,0); }
    55.5%     { opacity:0; transform:translate(0,0); }
    82.9%     { opacity:0; }
    83%       { opacity:.7; transform:translate(2px,0); }
