  }
  .glitch-jitter { animation: glitchJitter 10.0s linear infinite; }
  @keyframes glitchJitter {
    0%,20.9% { transform:translate(0,0); }
    21%      { transform:translate(1.5px,0); }
    21.3%    { transform:translate(-1px,0); }
    21.6%    { transform:translate(0,0); }
    54.9%    { transform:translate(0,0); }
    55%      { transform:translate(-1.5px,0); }
    55.3%    { transform:translate(0,0); }
    82.9%    { transform:translate(0,0); }
    83%      { transform:translate(1px,0); }
    83.3%    { transform:translate(0,0); }
    100%     { transform:translate(0,0); }
  }

